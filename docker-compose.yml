version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: async_executor_db
    environment:
      POSTGRES_USER: executor_user
      POSTGRES_PASSWORD: executor_password
      POSTGRES_DB: executor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U executor_user -d executor_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: async_executor_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
