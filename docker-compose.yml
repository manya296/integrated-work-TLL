  # -------------------------------------------------------
  # FastAPI Backend (Scan Engine API)
  # -------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: trustlayer_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://executor_user:executor_password@db:5432/executor_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - DEBUG=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./reports:/app/reports
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -------------------------------------------------------
  # Worker Pool Manager (Async Execution Engine)
  # -------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: trustlayer_worker
    command: ["python", "run_worker.py"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://executor_user:executor_password@db:5432/executor_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - WORKER_CONCURRENCY=50
      - WORKER_TIMEOUT=30
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # -------------------------------------------------------
  # Next.js Frontend (Security Console UI)
  # -------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trustlayer_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy

  # -------------------------------------------------------
  # Nginx Reverse Proxy (routes /api → backend, / → frontend)
  # -------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: trustlayer_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api
    restart: unless-stopped
